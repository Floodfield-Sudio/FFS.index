name: Deploy static content to Pages

on:
  # Se déclenche lors d'un push sur la branche par défaut (main)
  push:
    branches: ["main"]

  # Permet de lancer le déploiement manuellement depuis l'onglet Actions
  workflow_dispatch:

# Force l'utilisation de Node.js 24 pour éviter les avertissements de dépréciation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:
        deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Déploie tout le contenu du dépôt (fichiers .md, images, etc.)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
